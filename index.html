<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello, SKALA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Sans KR', sans-serif;
    background: #0d1b2a;
    color: #fff;
    overflow: hidden;
  }
  .glow {
    position: absolute; width: 520px; height: 520px; border-radius: 50%;
    background: radial-gradient(circle, rgba(27,110,243,.45), transparent 70%);
    filter: blur(40px); z-index: 0;
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(-12px);} 50%{transform:translateY(12px);} }
  .card { position: relative; z-index: 1; text-align: center; padding: 24px; }
  .eyebrow {
    font-family: 'Space Grotesk', sans-serif;
    letter-spacing: .22em; text-transform: uppercase;
    font-size: .8rem; color: #7aa8f5; margin-bottom: 18px;
    opacity: 0; animation: rise .7s ease .1s forwards;
  }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(2.6rem, 9vw, 5.5rem); font-weight: 700;
    line-height: 1.05; letter-spacing: -.02em;
    opacity: 0; animation: rise .7s ease .25s forwards;
  }
  h1 .accent { color: #1b6ef3; }
  .name {
    margin-top: 20px; font-size: 1.15rem; color: #a9bcd0; font-weight: 500;
    opacity: 0; animation: rise .7s ease .45s forwards;
  }
  .name b { color: #fff; font-weight: 700; }
  @keyframes rise { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <div class="eyebrow">SK AI/DX Academy</div>
    <h1>Hello, <span class="accent">SKALA</span></h1>
    <p class="name">안녕하세요, <b>노영오</b>입니다 👋</p>
  </div>
</body>
</html>
